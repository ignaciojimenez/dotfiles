name: lint

on:
  push:
    branches: [master]
  pull_request:

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run shellcheck
        # SC1090/SC1091: dynamic source paths (~/.foo, $SCRIPT_DIR/...) — by design.
        # SC2155: declare-and-assign on the same line — a stylistic warning we tolerate.
        run: |
          shopt -s nullglob
          shellcheck \
            --shell=bash \
            --severity=warning \
            --exclude=SC1090,SC1091,SC2155 \
            bootstrap.sh \
            env_bootstrap.sh \
            thefiles/.ansible_preauth \
            thefiles/.aliases \
            thefiles/.bash_options \
            thefiles/.bash_profile \
            thefiles/.common_functions \
            thefiles/.exports \
            thefiles/.profile \
            thefiles/.security \
            thefiles/.shell_options \
            thefiles/.scripts/brew_maintain \
            thefiles/.scripts/ansible-vault-pass \
            thefiles/.scripts/test_ansible_integration.sh \
            thefiles/.scripts/test_ansible_preauth_unit.sh

  shell-syntax:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install zsh
        run: sudo apt-get update && sudo apt-get install -y zsh

      - name: bash -n on bash files
        run: |
          for f in bootstrap.sh env_bootstrap.sh \
                   thefiles/.ansible_preauth \
                   thefiles/.aliases \
                   thefiles/.bash_options \
                   thefiles/.bash_profile \
                   thefiles/.common_functions \
                   thefiles/.exports \
                   thefiles/.profile \
                   thefiles/.security \
                   thefiles/.shell_options \
                   thefiles/.scripts/*.sh \
                   thefiles/.scripts/brew_maintain \
                   thefiles/.scripts/ansible-vault-pass; do
            bash -n "$f" && echo "ok: $f"
          done

      - name: zsh -n on zsh-only files
        run: |
          for f in thefiles/.zshrc thefiles/.zprofile \
                   thefiles/.zsh_options thefiles/.zsh_keys; do
            zsh -n "$f" && echo "ok: $f"
          done

  brewfile:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate Brewfile parses
        run: brew bundle list --file=thefiles/Brewfile

  bootstrap-dry-run:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Symlink dry-run
        run: ./bootstrap.sh --dry-run
